        :root {

            --primary: #c27d65;       /* Warm Terracotta untuk aksen utama & tombol */

        body {

            background-color: var(--bg-main);
            color: var(--text-dark);
            line-height: 1.6;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: #fff;
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--primary);
        }
        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: var(--text-dark);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            transition: 0.3s;
        }
        nav a:hover {
            color: var(--primary);
        }

            padding: 60px 20px;

        .hero {

            border-radius: 12px;
            margin-bottom: 60px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .hero-text { flex: 1; }
        .hero-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            margin-bottom: 20px;
            color: var(--text-dark);
        }
        .hero-text p {
            font-size: 15px;
            color: #554e4b;
            margin-bottom: 30px;
        }
        .hero-img { flex: 1; text-align: right; }
        .hero-img img { max-width: 100%; border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }

        .btn-primary {
            display: inline-block;

            color: var(--text-light);

            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            border-radius: 4px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(194, 125, 101, 0.3);
        }
        .btn-primary:hover {
            background: #ab6a53;
            transform: translateY(-2px);
        }
